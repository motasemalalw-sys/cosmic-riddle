name: Build Android APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
    - name: Pull from Replit
      run: |
        git config --global user.name "Replit Agent"
        git config --global user.email "agent@replit.com"
        git remote add replit https://x-token-auth:${{ secrets.REPLIT_TOKEN }}@://replit.com || true
        git pull replit main --allow-unrelated-histories || true
    - name: Find Project Root
      run: |
        SUB_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \;)
        echo "PROJECT_DIR=$SUB_DIR" >> $GITHUB_ENV
    - name: Install Dependencies
      run: |
        cd ${{ env.PROJECT_DIR }}
        npm install --legacy-peer-deps || true
    - name: Build Web App
      run: |
        cd ${{ env.PROJECT_DIR }}
        npm run build || true
    - name: Ensure Web Directory
      run: |
        cd ${{ env.PROJECT_DIR }}
        if [ -d "dist" ]; then echo "WEB_TARGET=dist" >> $GITHUB_ENV;
        elif [ -d "build" ]; then echo "WEB_TARGET=build" >> $GITHUB_ENV;
        elif [ -d "www" ]; then echo "WEB_TARGET=www" >> $GITHUB_ENV;
        else
          mkdir -p www && echo "<html><body>Cosmic Riddle</body></html>" > www/index.html
          echo "WEB_TARGET=www" >> $GITHUB_ENV;
        fi
    - name: Build Android APK with Capacitor
      run: |
        cd ${{ env.PROJECT_DIR }}
        npm install -g @capacitor/cli @capacitor/android
        npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps || true
        npx cap init "CosmicRiddle" "com.cosmic.riddle" --web-dir=${{ env.WEB_TARGET }} || true
        npx cap add android || true
        npx cap sync || true
        if [ -d "android" ]; then
          cd android && ./gradlew assembleDebug
        else
          cd android || true
          ./gradlew assembleDebug || true
        fi
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cosmic-riddle-apk
        path: |
          ${{ env.PROJECT_DIR }}/android/app/build/outputs/apk/debug/app-debug.apk
          **/*.apk
