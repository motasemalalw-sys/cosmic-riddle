name: Build Android APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
    - name: Pull from Replit
      run: |
        git config --global user.name "Replit Agent"
        git config --global user.email "agent@replit.com"
        git remote add replit https://x-token-auth:${{ secrets.REPLIT_TOKEN }}@://replit.com || true
        git pull replit main --allow-unrelated-histories || true
    - name: Install Dependencies
      run: npm install || true
    - name: Build Web App
      run: npm run build || true
    - name: Build Android APK with Capacitor
      run: |
        npm install @capacitor/cli @capacitor/android || true
        npx cap init "Cosmic Riddle" "com.cosmic.riddle" --web-dir=dist || true
        npx cap add android || true
        npx cap sync || true
        cd android && ./gradlew assembleDebug
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cosmic-riddle-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
